name: Publish posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 6'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diary
        uses: actions/checkout@v4

      - name: Collect and publish posts
        run: bash .github/workflows/collect-posts.sh

      - name: Check for changes
        id: changes
        run: |
          git add _posts/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update posts from source repos"
          git push

      - name: Publish drafts to dev.to
        if: env.DEV_TO_API_KEY != ''
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
        run: bash .github/workflows/devto-publish.sh

      - name: Post to Mastodon
        if: env.MASTODON_ACCESS_TOKEN != ''
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: bash .github/workflows/mastodon-publish.sh

      - name: Queue to Buffer (LinkedIn, Twitter, Threads)
        if: env.BUFFER_ACCESS_TOKEN != ''
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
        run: bash .github/workflows/buffer-publish.sh

