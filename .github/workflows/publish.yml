name: Publish posts

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no drafts created, only logs)'
        type: boolean
        default: false
  # schedule:
  #   - cron: '0 6 * * 6'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diary
        uses: actions/checkout@v4

      - name: Checkout publish scripts
        uses: actions/checkout@v4
        with:
          repository: bilardi/github-actions-publish
          ref: v0.2.1
          path: .publish-scripts

      - name: Install dependencies
        run: pip install pyyaml

      - name: Collect and publish posts
        run: bash .github/workflows/collect-posts.sh

      - name: Check for changes
        id: changes
        run: |
          git add _posts/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update posts from source repos"
          git push

      - name: Parse posts for social publishing
        run: bash scripts/parse-diary.sh

      - name: Post to Mastodon
        if: env.MASTODON_ACCESS_TOKEN != ''
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash .publish-scripts/scripts/mastodon-publish.sh

      - name: Queue to Buffer (LinkedIn, Twitter, Threads)
        if: env.BUFFER_ACCESS_TOKEN != ''
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash .publish-scripts/scripts/buffer-publish.sh

      - name: Publish drafts to dev.to
        if: env.DEV_TO_API_KEY != ''
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash .publish-scripts/scripts/devto-publish.sh
