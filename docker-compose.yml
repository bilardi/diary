services:
  jekyll:
    image: jekyll/jekyll:4.2.0
    command: jekyll serve --watch --incremental --host 127.0.0.1
    network_mode: host
    volumes:
      - ${PWD}:/srv/jekyll:Z
      - jekyll_cache:/srv/jekyll/.jekyll-cache:Z
      - jekyll_site:/srv/jekyll/_site
    environment:
      JEKYLL_UID: ${UID:-1000}
      JEKYLL_GID: ${GID:-1000}

volumes:
  jekyll_cache:
  jekyll_site:
